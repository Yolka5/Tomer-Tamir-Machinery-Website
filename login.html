<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Employee Login | TTM FORGE OS</title>
  <meta name="robots" content="noindex">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Ubuntu:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="icon" href="TTMNewLogo.png" type="image/png">
  <link rel="stylesheet" href="forge.css?v=3">
</head>
<body class="system-body">
  <div class="login-wrap">
    <div class="login-card">
      <img src="TTMNewLogo.png" alt="TTM" class="login-card__logo">
      <h1 class="login-card__title">TTM FORGE OS</h1>
      <p class="login-card__sub">Employee access</p>

      <div class="login-error" id="login-error" hidden></div>

      <button type="button" class="login-google" id="google-signin">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
        Sign in with Google
      </button>

      <p class="login-note">Authorized TTM personnel only. Access is logged. New account sign-ups will be closed once all team members have joined.</p>
      <a href="index.html" class="login-back">← Back to ttm site</a>
    </div>
  </div>

  <div class="os-toast" id="toast"></div>

  <script type="module">
    import { firebaseConfig, isConfigured } from './firebase-config.js';

    const errorBox = document.getElementById('login-error');
    const googleBtn = document.getElementById('google-signin');

    function showError(msg) {
      errorBox.textContent = msg;
      errorBox.hidden = false;
    }

    if (!isConfigured()) {
      googleBtn.disabled = true;
      showError('Firebase is not configured yet. Paste your project config into firebase-config.js.');
    } else {
      const { initializeApp } = await import('https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js');
      const { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } =
        await import('https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js');

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const provider = new GoogleAuthProvider();

      onAuthStateChanged(auth, function (user) {
        if (user) window.location.replace('os.html');
      });

      googleBtn.addEventListener('click', async function () {
        errorBox.hidden = true;
        googleBtn.disabled = true;
        try {
          await signInWithPopup(auth, provider);
          window.location.href = 'os.html';
        } catch (err) {
          googleBtn.disabled = false;
          if (err.code === 'auth/popup-closed-by-user') return;
          if (err.code === 'auth/unauthorized-domain') {
            showError('This domain is not authorized in Firebase. Add it under Authentication → Settings → Authorized domains.');
          } else {
            showError('Sign-in failed: ' + (err.message || err.code || 'unknown error'));
          }
        }
      });
    }
  </script>
</body>
</html>
